###############################################################################
# General
###############################################################################

add_newline = true
command_timeout = 1000
scan_timeout = 10

format = """
$directory\
$git_branch\
$git_status\
$git_state\
$git_metrics\
$python\
$nodejs\
$golang\
$rust\
$java\
$docker_context\
$kubernetes\
$terraform\
$cmd_duration\
$line_break\
$character"""

###############################################################################
# Character
###############################################################################

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold yellow)"

###############################################################################
# Directory
###############################################################################

[directory]
truncation_length = 3
truncate_to_repo = true
read_only = " "
style = "bold cyan"

###############################################################################
# Git Branch
###############################################################################

[git_branch]
symbol = " "
style = "bold purple"

###############################################################################
# Git Status
###############################################################################

[git_status]
style = "bold yellow"

###############################################################################
# Git Metrics
###############################################################################

[git_metrics]
disabled = false

###############################################################################
# Command Duration
###############################################################################

[cmd_duration]
min_time = 1000
style = "yellow"

###############################################################################
# Python
###############################################################################

[python]
symbol = " "
format = "[$symbol($version )]($style)"
style = "yellow"

###############################################################################
# Node.js
###############################################################################

[nodejs]
symbol = " "
style = "green"

###############################################################################
# Go
###############################################################################

[golang]
symbol = " "
style = "cyan"

###############################################################################
# Rust
###############################################################################

[rust]
symbol = " "
style = "red"

###############################################################################
# Java
###############################################################################

[java]
symbol = " "
style = "red"

###############################################################################
# Docker
###############################################################################

[docker_context]
symbol = " "
style = "blue"

###############################################################################
# Kubernetes
###############################################################################

[kubernetes]
disabled = false
symbol = "☸ "
style = "blue"

###############################################################################
# Terraform
###############################################################################

[terraform]
symbol = " "
style = "magenta"

###############################################################################
# Username
###############################################################################

[username]
disabled = true

###############################################################################
# Hostname
###############################################################################

[hostname]
disabled = true

###############################################################################
# Package
###############################################################################

[package]
disabled = true

###############################################################################
# AWS
###############################################################################

[aws]
disabled = true

###############################################################################
# GCloud
###############################################################################

[gcloud]
disabled = true

###############################################################################
# Azure
###############################################################################

[azure]
disabled = true

###############################################################################
# Battery
###############################################################################

[battery]
disabled = true

###############################################################################
# Time
###############################################################################

[time]
disabled = true

###############################################################################
# Memory
###############################################################################

[memory_usage]
disabled = true